# Polyglot 统一模型配置
#
# 本文件定义被测模型和 Judge 模型的端点配置。
# API Key 等敏感信息通过 ${ENV_VAR} 语法从环境变量注入（也可写在 .env 文件中）。
#
# 使用方式：
#   cp polyglot.yaml.example polyglot.yaml
#   # 编辑 polyglot.yaml 填入实际 provider/model 信息
#   # 在 .env 中设置对应的环境变量

# ──────────────────────────────────────────────
# Provider 定义
# 一个 provider 对应一个 API 代理端点，可挂载多个模型
# ──────────────────────────────────────────────
providers:
  proxy_a:
    base_url: "${PROXY_A_BASE_URL}"
    api_key: "${PROXY_A_API_KEY}"
    api_format: openai     # openai (OpenAI Chat Completions 兼容) | anthropic
    wire_api: chat_completions
    supports_native_web_search: false
    harnesses:
      claude_code:
        # Proxy A uses the same root for Anthropic-compatible Messages.
        base_url: "${PROXY_A_BASE_URL}"
        api_format: anthropic
        wire_api: messages
        auth_mode: api_key
        supports_native_web_search: false
        patch_streaming_message_start: true
      codex:
        # Proxy A support varies by model. Route Codex through the run-scoped
        # runtime.codex_responses_proxy so models with Chat Completions but no
        # native /v1/responses support still work.
        base_url: "${PROXY_A_BASE_URL}"
        wire_api: chat_completions
        api_format: openai
        supports_native_web_search: false
        strip_encrypted_reasoning: true
    models:
      - id: gpt-5.4
        name: "GPT-5.4 (A)"
      - id: qwen3.6-plus
        name: "Qwen 3.6 Plus (A)"
      - id: claude-sonnet-4-6-thinking
        name: "Claude Sonnet 4.6 Thinking (A)"
      - id: claude-opus-4-7-thinking
        name: "Claude Opus 4.7 Thinking (A)"
      - id: claude-opus-4-8
        name: "Claude Opus 4.8 (A)"
      - id: Qwen/Qwen3.5-35B-A3B
        name: "Qwen 3.5 35B A3B (A)"
      - id: stepfun/step-3.5-flash
        name: "Step 3.5 Flash (A)"
      - id: google/gemma-4-31b-it
        name: "Gemma 4 31B IT (A)"
      - id: claude-haiku-4-5-20251001-thinking
        name: "Claude Haiku 4.5 20251001 Thinking (A)"
      - id: gemini-3-flash-preview-thinking
        name: "Gemini 3 Flash Preview Thinking (A)"
      - id: qwen/qwen3.6-plus:free
        name: "Qwen 3.6 Plus Free (A)"
      - id: qwen3.6-35b-a3b
        name: "Qwen 3.6 35B A3B (A)"
      # - id: gemini-3.1-pro-preview-thinking
      #   name: "Gemini 3.1 Pro Thinking (A)"

  stable_default_provider:
    base_url: "${STABLE_DEFAULT_PROVIDER_BASE_URL}"
    api_key: "${STABLE_DEFAULT_PROVIDER_API_KEY}"
    api_format: openai
    models:
      - id: gpt-5.4
        name: "GPT-5.4 (Stable Default)"

  # proxy_b:
  #   base_url: "${PROXY_B_BASE_URL}"
  #   api_key: "${PROXY_B_API_KEY}"
  #   api_format: openai
  #   models:
  #     - id: intern-s1-pro
  #       name: "InternLM S1 Pro (B)"
  #     - id: intern-s1
  #       name: "InternLM S1 (B)"

  proxy_c:
    base_url: "${PROXY_C_BASE_URL}"
    api_key: "${PROXY_C_API_KEY}"
    api_format: openai
    models:
      - id: intern-s1-pro
        name: "Intern S1 Pro (C)"

  intern_proxy:
    base_url: "${INTERN_PROXY_BASE_URL}"
    api_key: "${INTERN_PROXY_API_KEY}"
    api_format: openai
    wire_api: chat_completions
    supports_native_web_search: false
    harnesses:
      claude_code:
        # Anthropic-compatible Claude Code endpoint for the same physical proxy.
        # It reuses INTERN_PROXY_API_KEY below as ANTHROPIC_AUTH_TOKEN.
        base_url: "${INTERN_PROXY_CLAUDE_BASE_URL}"
        api_format: anthropic
        auth_mode: auth_token
        supports_native_web_search: false
      codex:
        # Intern proxy exposes OpenAI Chat Completions; Codex will use the
        # run-scoped runtime.codex_responses_proxy to present /v1/responses.
        wire_api: chat_completions
        api_format: openai
        supports_native_web_search: false
    models:
      - id: intern-s2-preview
        name: "Intern S2 Preview"
      - id: intern-s1-pro
        name: "Intern S1 Pro"

  mandao_proxy:
    base_url: "${MANDAO_OPENAI_BASE_URL}"
    api_key: "${MANDAO_API_KEY}"
    api_format: openai
    wire_api: chat_completions
    supports_native_web_search: false
    harnesses:
      claude_code:
        # Anthropic-compatible Messages endpoint for Claude Code.
        base_url: "${MANDAO_ANTHROPIC_BASE_URL}"
        api_format: anthropic
        wire_api: messages
        auth_mode: api_key
        supports_native_web_search: false
      codex:
        # Mandao exposes OpenAI Chat Completions; Codex will use the
        # run-scoped runtime.codex_responses_proxy to present /v1/responses.
        # open-responses-server appends /v1/chat/completions to this upstream,
        # so the codex override intentionally uses the provider root.
        base_url: "${MANDAO_ANTHROPIC_BASE_URL}"
        wire_api: chat_completions
        api_format: openai
        supports_native_web_search: false
    models:
      - id: gpt-5.5
        name: "GPT-5.5 (Mandao)"
      - id: claude-opus-4-7
        name: "Claude Opus 4.7 (Mandao)"

  intern_proxy_alias:
    base_url: "${INTERN_PROXY_BASE_URL}"
    api_key: "${INTERN_PROXY_API_KEY}"
    api_format: openai
    models:
      - id: intern-s2-preview
        name: "Intern S2 Preview (variance alias)"
        alias_model_name: intern-s2-preview-variance

  zhipu_glm:
    base_url: "${GLM_BASE_URL}"
    api_key: "${GLM_API_KEY}"
    api_format: openai
    wire_api: chat_completions
    supports_native_web_search: false
    harnesses:
      claude_code:
        # Official Anthropic-compatible Messages endpoint:
        # https://api.z.ai/api/anthropic/v1/messages
        base_url: "https://api.z.ai/api/anthropic"
        api_format: anthropic
        wire_api: messages
        auth_mode: api_key
        supports_native_web_search: false
        patch_streaming_message_start: false
      codex:
        # GLM exposes Chat Completions, not /v1/responses. Codex therefore
        # still needs runtime.codex_responses_proxy for Responses compatibility.
        # The current proxy appends /v1/chat/completions; GLM's direct OpenAI
        # compatible endpoint is /api/paas/v4/chat/completions.
        base_url: "${GLM_BASE_URL}"
        wire_api: chat_completions
        api_format: openai
        supports_native_web_search: false
    models:
      - id: glm-5
        name: "GLM-5"
      - id: glm-5.1
        name: "GLM-5.1"

