# ──────────────────────────────────────────────
# 运行参数（非敏感，统一放在 YAML 中）
# ──────────────────────────────────────────────
runtime:
  output_dir: ./output
  workspace_base: ~/.polyglot/workspaces
  task_timeout_seconds: 1440
  grader_timeout_seconds: 120
  openclaw_timeout_seconds: 1200
  openclaw_llm_idle_timeout_seconds: 1200
  openclaw_rerun_attempts: 3
  max_tool_calls: 400
  log_level: INFO
  claude_code_cli_path: ./node_modules/.bin/claude
  claude_code_cli_version: "2.1.144"
  codex_cli_path: ./node_modules/.bin/codex
  codex_cli_version: "0.131.0"
  codex_responses_proxy:
    enabled: true
    command: _local/open-responses-server/.venv/bin/otc
    args:
      - start
    startup_timeout_seconds: 30
    stream_timeout_seconds: 600
    supports_native_web_search: false
    log_level: INFO
  web_access:
    enabled: true
    mode: live
    native_search_enabled: false
    allow_domains:
      - "*"
    allow_local_binding: true
    fail_fast: true
    github_token_env_var: POLYGLOT_GITHUB_TOKEN
  web_mcp:
    enabled: true
    provider: tavily
    server_name: tavily
    transport: stdio
    command: ./node_modules/.bin/tavily-mcp
    env:
      TAVILY_API_KEY: "${TAVILY_API_KEY}"
    required: true
    startup_timeout_seconds: 20
    tool_timeout_seconds: 60
    # Empty means expose all tools provided by this MCP server to both
    # Claude Code and Codex.
    enabled_tools: []

# ──────────────────────────────────────────────
# Subagent 默认配置
# 作为所有 task-level agent_runtime.defaults_patch 的低优先级默认值
# ──────────────────────────────────────────────
subagent:
  defaults_patch:
    subagents:
      # Model is injected from the active model-under-test by the OpenClaw
      # config generator. Task-level agent_runtime defaults may still override.
      # thinking: low
      maxSpawnDepth: 2

# ──────────────────────────────────────────────
# 被测模型 (Model Under Test)
# 通过 OpenClaw agent 执行评测任务
# ──────────────────────────────────────────────
model:
  provider: openai
  model_id: gpt5.5-xhigh
  # 可选采样参数，不设置则使用 provider 默认值
  # temperature: 0.0
  # top_p: 1.0
  # max_tokens: 8192
  # extra_body:
  #   spaces_between_special_tokens: false

# ──────────────────────────────────────────────
# Judge 模型
# 支持多个 judge 模型交叉投票，减少单模型 bias
# ──────────────────────────────────────────────
judge:
  votes_per_model: 3           # 每个 judge 模型投几票
  variance_threshold: 0.2      # 方差超过此阈值时追加投票
  # 共享的采样参数（各 judge 模型统一使用）
  params:
    temperature: 0.2
    max_tokens: 32949
  # judge 模型列表，可来自同一个或不同的 provider
  models:
    - provider: stable_default_provider
      model_id: gpt-5.4
    # - provider: proxy_a
    #   model_id: claude-sonnet-4-6-thinking
